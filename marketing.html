<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --color-primary: #2563eb;
            --color-primary-light: #3b82f6;
            --color-bg: #ffffff;
            --color-surface: #f9fafb;
            --color-border: #e5e7eb;
            --color-text: #1f2937;
            --color-text-secondary: #6b7280;
            --color-text-tertiary: #9ca3af;
            --color-shadow: rgba(0,0,0,0.08);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s ease;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            color: var(--color-text);
            background: var(--color-bg);
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

        header {
            position: relative;
            padding: 32px 0 24px;
            border-bottom: 1px solid var(--color-border);
            background: linear-gradient(180deg, var(--color-surface) 0%, var(--color-bg) 100%);
        }
        header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6 0%, #2563eb 50%, #06b6d4 100%);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { display: flex; align-items: center; gap: 12px; }
        h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { color: var(--color-text-secondary); font-size: 13px; margin-top: 4px; }
        .version-badge {
            background: #8b5cf6;
            color: white;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            border-bottom: 1px solid var(--color-border);
            margin-top: 16px;
        }
        .tab-button {
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 0;
            border-bottom: 3px solid transparent;
            color: var(--color-text-secondary);
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }
        .tab-button:hover { color: var(--color-text); background: var(--color-surface); }
        .tab-button.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

        /* Stats Banner */
        .stats-banner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin: 24px 0;
        }
        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            text-align: center;
        }
        .stat-label {
            font-size: 11px; font-weight: 600;
            color: var(--color-text-tertiary);
            letter-spacing: 0.5px; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .stat-value {
            font-family: var(--font-mono);
            font-size: 18px; font-weight: 600;
            color: var(--color-primary);
        }
        .stat-change { font-size: 11px; margin-top: 4px; font-weight: 500; }
        .stat-change.up { color: #22c55e; }
        .stat-change.down { color: #dc2626; }

        /* Chart Container */
        .chart-container {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin: 24px 0;
            box-shadow: 0 1px 3px var(--color-shadow);
            position: relative;
        }
        .chart-container.tall { height: 500px; }
        .chart-container.medium { height: 380px; }
        .chart-wrapper { position: relative; height: 100%; width: 100%; }

        /* Group legend / toggles */
        .group-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 16px 0;
        }
        .group-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1.5px solid var(--color-border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            background: white;
            user-select: none;
        }
        .group-toggle:hover { border-color: var(--color-primary); }
        .group-toggle.active {
            border-color: var(--group-color);
            background: color-mix(in srgb, var(--group-color) 8%, white);
        }
        .group-toggle .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--group-color);
        }
        .group-toggle.inactive .dot { opacity: 0.3; }
        .group-toggle.inactive { opacity: 0.5; }

        /* View mode switch */
        .view-switch {
            display: flex;
            gap: 4px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 3px;
        }
        .view-switch button {
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-family: var(--font-sans);
            transition: var(--transition);
        }
        .view-switch button.active {
            background: white;
            color: var(--color-primary);
            box-shadow: 0 1px 3px var(--color-shadow);
        }

        /* Data table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
            font-size: 12px;
            margin: 24px 0;
        }
        .data-table thead {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }
        .data-table th {
            padding: 12px 16px;
            text-align: right;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.5px; text-transform: uppercase;
            color: var(--color-text-tertiary);
        }
        .data-table th:first-child { text-align: left; }
        .data-table td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--color-border);
            font-family: var(--font-mono);
            font-size: 12px;
            text-align: right;
        }
        .data-table td:first-child {
            text-align: left;
            font-family: var(--font-sans);
            font-weight: 500;
        }
        .data-table tbody tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--color-surface); }
        .data-table .total-row { font-weight: 600; background: var(--color-surface); }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 8px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .toolbar h3 { font-size: 14px; font-weight: 600; }

        /* Compare filter bar */
        .compare-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            margin: 12px 0;
            font-size: 12px;
        }
        .compare-filter label {
            font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--color-text-tertiary);
            white-space: nowrap;
        }
        .compare-filter .filter-input {
            width: 64px; padding: 5px 8px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-size: 12px;
            text-align: center; background: white;
        }
        .compare-filter .filter-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
        }
        .compare-filter .preset-btn {
            padding: 4px 10px; font-size: 11px;
            border: 1px solid var(--color-border);
            background: white; border-radius: var(--radius-sm);
            cursor: pointer; color: var(--color-text-secondary);
            font-weight: 500; font-family: var(--font-mono);
            transition: var(--transition);
        }
        .compare-filter .preset-btn:hover {
            border-color: var(--color-primary); color: var(--color-primary);
        }
        .compare-filter .preset-btn.active {
            background: var(--color-primary); color: white;
            border-color: var(--color-primary);
        }
        .compare-filter .filter-info {
            font-family: var(--font-mono); font-size: 11px;
            color: var(--color-primary); font-weight: 500;
            margin-left: auto;
        }

        .hidden { display: none !important; }

        /* Group Builder */
        .group-builder-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .group-builder-toggle:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .group-builder-toggle.open { border-color: var(--color-primary); color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 5%, white); }

        .group-builder-panel {
            display: none;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin: 16px 0;
            animation: fadeIn 0.3s ease;
        }
        .group-builder-panel.open { display: block; }
        .group-builder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .group-builder-header h4 { font-size: 13px; font-weight: 600; }
        .group-builder-actions {
            display: flex;
            gap: 8px;
        }
        .gb-btn {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: white;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-family: var(--font-sans);
            transition: var(--transition);
        }
        .gb-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .gb-btn.primary { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .gb-btn.primary:hover { background: var(--color-primary-light); }
        .gb-btn.danger:hover { border-color: #dc2626; color: #dc2626; }

        .group-rows {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .group-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
        }
        .group-row .color-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .group-row .row-label {
            font-size: 11px; font-weight: 600;
            color: var(--color-text-tertiary);
            width: 20px; text-align: center;
            flex-shrink: 0;
        }
        .group-row input {
            width: 80px; padding: 4px 8px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-size: 12px;
            text-align: center; background: white;
        }
        .group-row input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
        }
        .group-row .dash { color: var(--color-text-tertiary); font-size: 12px; }
        .group-row .remove-btn {
            margin-left: auto;
            background: none; border: none;
            color: var(--color-text-tertiary);
            cursor: pointer; font-size: 16px;
            padding: 0 4px; line-height: 1;
            transition: var(--transition);
        }
        .group-row .remove-btn:hover { color: #dc2626; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div>
                    <div class="header-title">
                        <h1>Purchase Distribution by Round</h1>
                        <span class="version-badge">v2.0</span>
                    </div>
                    <p class="subtitle">จำนวนผู้ซื้อแยกตามจำนวนชิ้นที่ซื้อในแต่ละงวด (02 ม.ค. - 01 เม.ย. 2569)</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding-bottom: 40px;">
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('trend', event)">Trend</button>
            <button class="tab-button" onclick="switchTab('compare', event)">Compare Rounds</button>
            <button class="tab-button" onclick="switchTab('table', event)">Data Table</button>
            <div style="margin-left:auto;display:flex;align-items:center;">
                <button class="group-builder-toggle" onclick="toggleGroupBuilder()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/></svg>
                    Customize Groups
                </button>
            </div>
        </div>

        <!-- Group Builder Panel -->
        <div class="group-builder-panel" id="group-builder-panel">
            <div class="group-builder-header">
                <h4>Custom Item Groups</h4>
                <div class="group-builder-actions">
                    <button class="gb-btn" onclick="addGroupRow()">+ Add Group</button>
                    <button class="gb-btn danger" onclick="resetGroups()">Reset Default</button>
                    <button class="gb-btn primary" onclick="applyCustomGroups()">Apply</button>
                </div>
            </div>
            <div class="group-rows" id="group-rows"></div>
        </div>

        <!-- Trend Tab -->
        <div id="tab-trend" class="tab-content active">
            <div class="stats-banner" id="stats-banner"></div>
            <div class="toolbar">
                <h3>Users by Item Group per Round</h3>
                <div class="view-switch">
                    <button class="active" onclick="setChartMode('absolute', event)">Absolute</button>
                    <button onclick="setChartMode('percent', event)">% Share</button>
                    <button onclick="setChartMode('stacked', event)">Stacked</button>
                </div>
            </div>
            <div class="group-toggles" id="group-toggles"></div>
            <div class="chart-container tall">
                <div class="chart-wrapper">
                    <canvas id="chart-trend"></canvas>
                </div>
            </div>
        </div>

        <!-- Compare Tab -->
        <div id="tab-compare" class="tab-content">
            <div class="toolbar">
                <h3>Distribution Comparison (Histogram per Round)</h3>
            </div>
            <div class="compare-filter" id="compare-filter"></div>
            <div class="chart-container tall">
                <div class="chart-wrapper">
                    <canvas id="chart-compare"></canvas>
                </div>
            </div>
        </div>

        <!-- Table Tab -->
        <div id="tab-table" class="tab-content">
            <div class="toolbar">
                <h3>Detailed Data Table</h3>
                <div class="view-switch">
                    <button class="active" onclick="setTableMode('grouped', event)">Grouped</button>
                    <button onclick="setTableMode('pct', event)">% Share</button>
                </div>
            </div>
            <div id="table-container"></div>
        </div>
    </main>

        const DEFAULT_GROUPS = [

        function assignColors(groups) {
            return groups.map((g, i) => ({ ...g, color: COLOR_PALETTE[i % COLOR_PALETTE.length] }));
        }

        let GROUPS = assignColors(DEFAULT_GROUPS);

        // ============================================================
        // STATE
        // ============================================================
        let chartMode = 'absolute'; // absolute | percent | stacked
        let tableMode = 'grouped';
        let activeGroups = GROUPS.map(() => true);
        let charts = {};
        let compareRange = [1, 50]; // default view range for compare chart

        // ============================================================
        // UTILITIES
        // ============================================================
        function formatNumber(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toLocaleString();
        }

        function formatRound(r) {
            const d = new Date(r);
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear().toString().slice(2)}`;
        }

        function getGroupedData() {
            // Returns { [roundDate]: [groupCount0, groupCount1, ...] }
            const result = {};
            ROUNDS.forEach(round => {
                const roundData = RAW_DATA.filter(d => d.round === round);
                result[round] = GROUPS.map(g => {
                    return roundData
                        .filter(d => d.item >= g.min && d.item <= g.max)
                        .reduce((sum, d) => sum + d.users, 0);
                });
            });
            return result;
        }

        function getRoundTotals() {
            const grouped = getGroupedData();
            const totals = {};
            ROUNDS.forEach(r => { totals[r] = grouped[r].reduce((s, v) => s + v, 0); });
            return totals;
        }

        // ============================================================
        // STATS BANNER
        // ============================================================
        function renderStats() {
            const totals = getRoundTotals();
            const latest = ROUNDS[ROUNDS.length - 1];
            const prev = ROUNDS[ROUNDS.length - 2];
            const latestTotal = totals[latest];
            const prevTotal = totals[prev];
            const change = ((latestTotal - prevTotal) / prevTotal * 100).toFixed(1);
            const changeClass = change >= 0 ? 'up' : 'down';
            const changeSign = change >= 0 ? '+' : '';

            // Find dominant group in latest round
            const grouped = getGroupedData();
            const latestGroups = grouped[latest];
            const maxIdx = latestGroups.indexOf(Math.max(...latestGroups));

            // Average items per user
            const latestRaw = RAW_DATA.filter(d => d.round === latest);
            const totalItems = latestRaw.reduce((s, d) => s + d.item * d.users, 0);
            const avgItems = (totalItems / latestTotal).toFixed(1);

            const banner = document.getElementById('stats-banner');
            banner.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Latest Round</div>
                    <div class="stat-value">${formatRound(latest)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value">${formatNumber(latestTotal)}</div>
                    <div class="stat-change ${changeClass}">${changeSign}${change}% vs prev</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Items/User</div>
                    <div class="stat-value">${avgItems}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Top Group</div>
                    <div class="stat-value">${GROUPS[maxIdx].label}</div>
                    <div class="stat-change" style="color:${GROUPS[maxIdx].color}">${(latestGroups[maxIdx]/latestTotal*100).toFixed(1)}% of users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Rounds</div>
                    <div class="stat-value">${ROUNDS.length}</div>
                </div>
            `;
        }

        // ============================================================
        // GROUP TOGGLES
        // ============================================================
        function renderGroupToggles() {
            const container = document.getElementById('group-toggles');
            const allActive = activeGroups.every(v => v);
            const noneActive = activeGroups.every(v => !v);
            container.innerHTML =
                `<div class="group-toggle ${allActive ? 'active' : 'inactive'}" style="--group-color: #22c55e" onclick="selectAllGroups()"><span class="dot"></span>All</div>` +
                `<div class="group-toggle ${noneActive ? 'active' : 'inactive'}" style="--group-color: #ef4444" onclick="clearAllGroups()"><span class="dot"></span>Clear</div>` +
                GROUPS.map((g, i) => `
                <div class="group-toggle ${activeGroups[i] ? 'active' : 'inactive'}"
                     style="--group-color: ${g.color}"
                     onclick="toggleGroup(${i})">
                    <span class="dot"></span>
                    ${g.label}
                </div>
            `).join('');
        }

        function toggleGroup(idx) {
            activeGroups[idx] = !activeGroups[idx];
            renderGroupToggles();
            renderTrendChart();
        }

        function selectAllGroups() {
            activeGroups = GROUPS.map(() => true);
            renderGroupToggles();
            renderTrendChart();
        }

        function clearAllGroups() {
            activeGroups = GROUPS.map(() => false);
            renderGroupToggles();
            renderTrendChart();
        }

        // ============================================================
        // TREND CHART
        // ============================================================
        function renderTrendChart() {
            const ctx = document.getElementById('chart-trend').getContext('2d');
            const grouped = getGroupedData();
            const totals = getRoundTotals();

            const datasets = GROUPS.map((g, i) => {
                if (!activeGroups[i]) return null;
                const data = ROUNDS.map(r => {
                    if (chartMode === 'percent') {
                        return totals[r] > 0 ? (grouped[r][i] / totals[r] * 100) : 0;
                    }
                    return grouped[r][i];
                });
                return {
                    label: g.label,
                    data: data,
                    borderColor: g.color,
                    backgroundColor: g.color + (chartMode === 'stacked' ? '99' : '22'),
                    borderWidth: 2.5,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: g.color,
                    pointBorderWidth: 2,
                    tension: 0.3,
                    fill: chartMode === 'stacked'
                };
            }).filter(Boolean);

            if (charts.trend) charts.trend.destroy();

            // Plugin: draw label at end of each line
            const endLabelPlugin = {
                id: 'endLabels',
                afterDatasetsDraw(chart) {
                    const { ctx, chartArea: { right } } = chart;
                    chart.data.datasets.forEach((ds, i) => {
                        const meta = chart.getDatasetMeta(i);
                        if (meta.hidden) return;
                        const lastPoint = meta.data[meta.data.length - 1];
                        if (!lastPoint) return;
                        const x = right + 6;
                        const y = lastPoint.y;
                        ctx.save();
                        ctx.font = 'bold 10px Inter, sans-serif';
                        ctx.fillStyle = ds.borderColor;
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(ds.label, x, y);
                        ctx.restore();
                    });
                }
            };

            // Plugin: highlight hovered line, dim others
            const hoverHighlightPlugin = {
                id: 'hoverHighlight',
                beforeDatasetsDraw(chart) {
                    const activeEls = chart.getActiveElements();
                    if (activeEls.length === 0) {
                        // Reset all to full opacity
                        chart.data.datasets.forEach((ds, i) => {
                            ds.borderWidth = 2.5;
                            ds.pointRadius = 5;
                        });
                        return;
                    }
                    const hoveredIdx = activeEls[0].datasetIndex;
                    chart.data.datasets.forEach((ds, i) => {
                        if (i === hoveredIdx) {
                            ds.borderWidth = 4;
                            ds.pointRadius = 6;
                        } else {
                            ds.borderWidth = 1.5;
                            ds.pointRadius = 3;
                        }
                    });
                }
            };

            charts.trend = new Chart(ctx, {
                type: 'line',
                data: { labels: ROUNDS.map(formatRound), datasets },
                plugins: [endLabelPlugin, hoverHighlightPlugin],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    layout: { padding: { right: 80 } },
                    interaction: { mode: 'nearest', intersect: false, axis: 'xy' },
                    onHover: (event, activeEls, chart) => {
                        chart.canvas.style.cursor = activeEls.length ? 'pointer' : 'default';
                        chart.update('none');
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#fff',
                            titleColor: '#1f2937',
                            bodyColor: '#6b7280',
                            borderColor: '#e5e7eb',
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 12,
                            titleFont: { family: 'Inter', weight: '600', size: 12 },
                            bodyFont: { family: 'JetBrains Mono', size: 11 },
                            displayColors: true,
                            callbacks: {
                                title: (items) => {
                                    if (!items.length) return '';
                                    return `${items[0].dataset.label}`;
                                },
                                afterTitle: (items) => {
                                    if (!items.length) return '';
                                    return `${items[0].label}`;
                                },
                                label: (item) => {
                                    const val = item.parsed.y;
                                    if (chartMode === 'percent') return ` ${val.toFixed(1)}%`;
                                    return ` ${formatNumber(val)} users`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            stacked: chartMode === 'stacked',
                            grid: { color: '#f5f5f5' },
                            border: { display: false },
                            ticks: {
                                font: { family: 'JetBrains Mono', size: 10 },
                                color: '#bbb',
                                callback: (val) => chartMode === 'percent' ? val + '%' : formatNumber(val)
                            }
                        },
                        x: {
                            stacked: chartMode === 'stacked',
                            grid: { display: false },
                            ticks: { font: { family: 'Inter', weight: '500', size: 11 }, color: '#666' }
                        }
                    }
                }
            });
        }

        function setChartMode(mode, event) {
            chartMode = mode;
            event.target.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTrendChart();
        }

        // ============================================================
        // COMPARE CHART (histogram overlay)
        // ============================================================
        const COMPARE_PRESETS = [
            { label: '1-10',  range: [1, 10] },
            { label: '1-20',  range: [1, 20] },
            { label: '1-50',  range: [1, 50] },
            { label: '1-100', range: [1, 100] },
            { label: '1-500', range: [1, 500] },
            { label: 'All',   range: null }
        ];

        function renderCompareFilter() {
            const bar = document.getElementById('compare-filter');
            const allMax = Math.max(...RAW_DATA.map(d => d.item));
            const cr = compareRange || [1, allMax];

            // Count users in range for latest round
            const latest = ROUNDS[ROUNDS.length - 1];
            const inRange = RAW_DATA.filter(d => d.round === latest && d.item >= cr[0] && d.item <= cr[1])
                .reduce((s, d) => s + d.users, 0);
            const total = RAW_DATA.filter(d => d.round === latest).reduce((s, d) => s + d.users, 0);
            const pct = (inRange / total * 100).toFixed(1);

            const presetHtml = COMPARE_PRESETS.map(p => {
                const isActive = p.range === null
                    ? !compareRange || (cr[0] === 1 && cr[1] >= allMax)
                    : compareRange && compareRange[0] === p.range[0] && compareRange[1] === p.range[1];
                return `<button class="preset-btn ${isActive ? 'active' : ''}" onclick="setComparePreset(${p.range ? JSON.stringify(p.range) : 'null'})">${p.label}</button>`;
            }).join('');

            bar.innerHTML = `
                <label>🔍 Item Range</label>
                <input type="number" class="filter-input" value="${cr[0]}" min="1" max="${allMax}"
                       oninput="updateCompareRange(parseInt(this.value), null)">
                <span style="color:var(--color-text-tertiary)">—</span>
                <input type="number" class="filter-input" value="${cr[1]}" min="1" max="${allMax}"
                       oninput="updateCompareRange(null, parseInt(this.value))">
                ${presetHtml}
                <span class="filter-info">${formatNumber(inRange)} users (${pct}%)</span>
            `;
        }

        function updateCompareRange(newMin, newMax) {
            const allMax = Math.max(...RAW_DATA.map(d => d.item));
            if (!compareRange) compareRange = [1, allMax];
            if (newMin !== null && !isNaN(newMin)) compareRange[0] = Math.max(1, newMin);
            if (newMax !== null && !isNaN(newMax)) compareRange[1] = Math.min(allMax, newMax);
            renderCompareFilter();
            renderCompareChart();
        }

        function setComparePreset(range) {
            if (range === null) {
                const allMax = Math.max(...RAW_DATA.map(d => d.item));
                compareRange = [1, allMax];
            } else {
                compareRange = [...range];
            }
            renderCompareFilter();
            renderCompareChart();
        }

        function renderCompareChart() {
            const ctx = document.getElementById('chart-compare').getContext('2d');
            const allMax = Math.max(...RAW_DATA.map(d => d.item));
            const cr = compareRange || [1, allMax];
            const minItem = cr[0];
            const maxItem = cr[1];

            const roundColors = ['#2563eb','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444'];

            const labels = [];
            for (let i = minItem; i <= maxItem; i++) labels.push(i);

            const datasets = ROUNDS.map((round, ri) => {
                const roundData = RAW_DATA.filter(d => d.round === round && d.item >= minItem && d.item <= maxItem);
                const dataMap = {};
                roundData.forEach(d => { dataMap[d.item] = d.users; });

                const data = labels.map(i => dataMap[i] || 0);

                return {
                    label: formatRound(round),
                    data: data,
                    borderColor: roundColors[ri % roundColors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: labels.length <= 30 ? 3 : 0,
                    pointHoverRadius: 5,
                    tension: 0.3
                };
            });

            if (charts.compare) charts.compare.destroy();

            charts.compare = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                pointStyle: 'line',
                                font: { family: 'Inter', size: 11 },
                                padding: 16
                            }
                        },
                        tooltip: {
                            backgroundColor: '#fff', titleColor: '#1f2937', bodyColor: '#6b7280',
                            borderColor: '#e5e7eb', borderWidth: 1, cornerRadius: 8, padding: 12,
                            titleFont: { family: 'Inter', weight: '600', size: 12 },
                            bodyFont: { family: 'JetBrains Mono', size: 11 },
                            callbacks: {
                                title: (items) => `Total Item = ${items[0].label}`,
                                label: (item) => `${item.dataset.label}: ${formatNumber(item.parsed.y)} users`
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f5f5f5' },
                            border: { display: false },
                            ticks: { font: { family: 'JetBrains Mono', size: 9 }, color: '#bbb', callback: v => formatNumber(v) }
                        },
                        x: {
                            grid: { display: false },
                            title: { display: true, text: 'Total Items Purchased', font: { family: 'Inter', size: 11 }, color: '#999' },
                            ticks: { font: { family: 'JetBrains Mono', size: 8 }, color: '#bbb', maxRotation: 0,
                                callback: function(val, idx) {
                                    const range = maxItem - minItem + 1;
                                    if (range <= 30) return labels[idx];
                                    const step = range <= 100 ? 5 : range <= 500 ? 25 : 100;
                                    return labels[idx] % step === 0 || idx === 0 ? labels[idx] : '';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ============================================================
        // DATA TABLE
        // ============================================================
        function renderTable() {
            const container = document.getElementById('table-container');
            const grouped = getGroupedData();
            const totals = getRoundTotals();

            let html = `<table class="data-table"><thead><tr>
                <th style="text-align:left">Group</th>
                ${ROUNDS.map(r => `<th>${formatRound(r)}</th>`).join('')}
            </tr></thead><tbody>`;

            GROUPS.forEach((g, i) => {
                html += `<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${g.color};margin-right:6px;vertical-align:middle;"></span>${g.label}</td>`;
                ROUNDS.forEach(r => {
                    const val = grouped[r][i];
                    if (tableMode === 'pct') {
                        html += `<td>${(val / totals[r] * 100).toFixed(1)}%</td>`;
                    } else {
                        html += `<td>${formatNumber(val)}</td>`;
                    }
                });
                html += `</tr>`;
            });

            // Total row
            html += `<tr class="total-row"><td>Total</td>`;
            ROUNDS.forEach(r => {
                html += `<td>${tableMode === 'pct' ? '100%' : formatNumber(totals[r])}</td>`;
            });
            html += `</tr>`;

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function setTableMode(mode, event) {
            tableMode = mode;
            event.target.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        // ============================================================
        // GROUP BUILDER
        // ============================================================
        let customRows = DEFAULT_GROUPS.map(g => ({ min: g.min, max: g.max }));

        function toggleGroupBuilder() {
            const panel = document.getElementById('group-builder-panel');
            const btn = document.querySelector('.group-builder-toggle');
            panel.classList.toggle('open');
            btn.classList.toggle('open');
            if (panel.classList.contains('open')) renderGroupRows();
        }

        function renderGroupRows() {
            const container = document.getElementById('group-rows');
            container.innerHTML = customRows.map((r, i) => `
                <div class="group-row">
                    <div class="color-dot" style="background:${COLOR_PALETTE[i % COLOR_PALETTE.length]}"></div>
                    <span class="row-label">${i + 1}</span>
                    <input type="number" value="${r.min}" min="1" placeholder="Min"
                           onchange="customRows[${i}].min=parseInt(this.value)||1">
                    <span class="dash">—</span>
                    <input type="number" value="${r.max >= 999999 ? '' : r.max}" min="1" placeholder="Max (empty = no limit)"
                           onchange="customRows[${i}].max=parseInt(this.value)||999999">
                    <button class="remove-btn" onclick="removeGroupRow(${i})" title="Remove">&times;</button>
                </div>
            `).join('');
        }

        function addGroupRow() {
            const lastMax = customRows.length > 0 ? customRows[customRows.length - 1].max : 0;
            const newMin = lastMax >= 999999 ? 1 : lastMax + 1;
            customRows.push({ min: newMin, max: newMin + 99 });
            renderGroupRows();
            const container = document.getElementById('group-rows');
            container.scrollTop = container.scrollHeight;
        }

        function removeGroupRow(idx) {
            if (customRows.length <= 1) return;
            customRows.splice(idx, 1);
            renderGroupRows();
        }

        function applyCustomGroups() {
            const newGroups = customRows
                .filter(r => r.min > 0)
                .sort((a, b) => a.min - b.min)
                .map(r => {
                    const maxVal = r.max || 999999;
                    const label = maxVal >= 999999
                        ? `${r.min.toLocaleString()}+`
                        : `${r.min.toLocaleString()}-${maxVal.toLocaleString()}`;
                    return { label, min: r.min, max: maxVal };
                });

            if (newGroups.length === 0) return;

            GROUPS = assignColors(newGroups);
            activeGroups = GROUPS.map(() => true);
            renderAll();
        }

        function resetGroups() {
            customRows = DEFAULT_GROUPS.map(g => ({ min: g.min, max: g.max }));
            GROUPS = assignColors(DEFAULT_GROUPS);
            activeGroups = GROUPS.map(() => true);
            renderGroupRows();
            renderAll();
        }

        function renderAll() {
            renderStats();
            renderGroupToggles();
            renderTrendChart();
            if (charts.compare) {
                renderCompareFilter();
                renderCompareChart();
            }
            if (document.getElementById('tab-table').classList.contains('active')) {
                renderTable();
            }
        }

        // ============================================================
        // TAB SWITCHING
        // ============================================================
        function switchTab(tab, event) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');

            // Lazy render
            if (tab === 'compare') {
                renderCompareFilter();
                if (!charts.compare) renderCompareChart();
            }
            if (tab === 'table') renderTable();
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            renderStats();
            renderGroupToggles();
            renderTrendChart();
        });
    </script>
</body>
</html>
